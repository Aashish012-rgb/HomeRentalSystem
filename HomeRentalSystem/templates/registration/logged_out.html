{% extends "layout.html" %}

{% block title %}Logged Out | HomeRental{% endblock %}

{% block content %}
<section class="container py-5">
  <div class="row justify-content-center">
    <div class="col-12 col-lg-6">
      <div class="card shadow-lg border-0">
        <div class="card-header bg-info text-white py-4">
          <h1 class="h3 mb-0 text-center">
            <i class="fas fa-sign-out-alt me-2"></i>Logged Out
          </h1>
        </div>
        <div class="card-body p-5 text-center">
          <p class="fs-5 text-muted mb-5">
            <i class="fas fa-wave-hand text-info mb-3" style="font-size: 3rem; display: block;"></i>
            You have been logged out successfully.
          </p>
          <a href="{% url 'login' %}" class="btn btn-info btn-lg fw-semibold">
            <i class="fas fa-lock me-2"></i>Sign In Again
          </a>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
