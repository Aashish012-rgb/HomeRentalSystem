{% extends "layout_minimal.html" %}

{% block title %}Password Updated{% endblock %}

{% block content %}
<section class="container py-5">
    <div class="row justify-content-center">
        <div class="col-12 col-md-7 col-lg-5">
            <div class="card shadow-lg border-0">
                <div class="card-header bg-success text-white py-4">
                    <h1 class="h3 mb-0">
                        <i class="fas fa-check-circle me-2"></i>Password Updated
                    </h1>
                </div>
                <div class="card-body p-5 text-center">
                    <p class="fs-5 text-muted mb-5">
                        <i class="fas fa-thumbs-up text-success mb-3" style="font-size: 3rem; display: block;"></i>
                        Your password was changed successfully.
                    </p>
                    <a href="{% url 'profile' %}" class="btn btn-success btn-lg fw-semibold">
                        <i class="fas fa-arrow-left me-2"></i>Back to Profile
                    </a>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
