{% extends "layout_minimal.html" %}

{% block title %}
Delete Property
{% endblock %}

{% block content %}
<section class="container py-5">
  <div class="row justify-content-center">
    <div class="col-12 col-lg-6">
      <div class="card shadow-lg border-0 border-danger">
        <div class="card-header bg-danger text-white py-4">
          <h1 class="h3 mb-0">
            <i class="fas fa-trash-alt me-2"></i>Delete Property
          </h1>
        </div>
        <div class="card-body p-5">
          <div class="alert alert-danger-light border border-danger mb-4" role="alert">
            <i class="fas fa-exclamation-triangle me-2" style="font-size: 1.5rem;"></i>
            <strong>Warning:</strong> This action cannot be undone.
          </div>
          
          <p class="fs-5 mb-3">Are you sure you want to delete this property?</p>
          <p class="card bg-light p-3 rounded mb-4">
            <strong class="d-block mb-2">Property:</strong>
            {{ property.title }}
          </p>

          <form method="post">
            {% csrf_token %}
            <div class="d-flex gap-3 flex-wrap">
              <button type="submit" class="btn btn-danger btn-lg fw-semibold">
                <i class="fas fa-check me-2"></i>Yes, Delete
              </button>
              <a href="{% url 'my_properties' %}" class="btn btn-outline-secondary btn-lg fw-semibold">
                <i class="fas fa-times me-2"></i>Cancel
              </a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
